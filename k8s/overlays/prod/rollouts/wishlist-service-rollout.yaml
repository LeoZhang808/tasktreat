###############################################################################
# Argo Rollouts replacement for the wishlist-service Deployment in production.
# See task-service-rollout.yaml for the rationale on canary steps and the
# zero-downtime controls.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: wishlist-service
  labels:
    app.kubernetes.io/name: wishlist-service
    app.kubernetes.io/part-of: tasktreat
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: wishlist-service
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause:
            duration: 60s
        - setWeight: 50
        - pause:
            duration: 60s
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wishlist-service
        app.kubernetes.io/part-of: tasktreat
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: wishlist-service
          image: tasktreat-dev-wishlist-service:dev-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: tasktreat-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tasktreat-db-secret
                  key: DATABASE_URL_WISHLIST
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
