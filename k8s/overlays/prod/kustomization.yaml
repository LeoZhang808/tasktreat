apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tasktreat-prod

resources:
  - ../../base
  # NOTE: argoproj.io RBAC for the deploy role is bootstrapped by Terraform
  # (infra/terraform/environments/dev/main.tf — kubernetes_role.deployers_argoproj_prod).
  # It cannot live here because the deploy role can't grant itself rules it
  # doesn't already hold (Kubernetes privilege-escalation guard).
  # Step 7: production swaps plain Deployments for Argo Rollouts to get
  # progressive (canary) delivery. The base Deployments for these four
  # workloads are removed in the patches block below.
  - rollouts/task-service-rollout.yaml
  - rollouts/wishlist-service-rollout.yaml
  - rollouts/reward-service-rollout.yaml
  - rollouts/frontend-rollout.yaml
  # PodDisruptionBudgets keep at least one replica up during voluntary
  # disruptions (node drain, cluster autoscaling), which is required for
  # the zero-downtime guarantee.
  - pdb/task-service-pdb.yaml
  - pdb/wishlist-service-pdb.yaml
  - pdb/reward-service-pdb.yaml
  - pdb/frontend-pdb.yaml

patches:
  # The base no longer renders a Namespace (cluster-scoped, managed
  # out-of-band), so namespace-patch.yaml in this dir is kept only for
  # reference. See k8s/README.md for the one-time `kubectl create namespace`.
  #
  # ingress-patch.yaml is gitignored and is rendered from
  # ingress-patch.yaml.template at deploy time by either
  # scripts/render-ingress-patch.sh (local) or the equivalent step in
  # .github/workflows/release-prod.yml (CI). This is what makes prod the
  # owner of the public app.tasktreat.dev hostname.
  - path: ingress-patch.yaml
    target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: tasktreat-ingress
  # Strip the base Deployments out of the prod overlay so we don't end up
  # with both Deployment/foo and Rollout/foo fighting over the same pods.
  - path: deployment-delete-task-service.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: task-service
  - path: deployment-delete-wishlist-service.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: wishlist-service
  - path: deployment-delete-reward-service.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: reward-service
  - path: deployment-delete-frontend.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: frontend

# kustomize image transformer applies to the pod template inside Rollouts the
# same way it does inside Deployments (matches by image name, not by Kind).
images:
  - name: tasktreat-dev-task-service
    newName: 066263929068.dkr.ecr.us-west-2.amazonaws.com/tasktreat-dev-task-service
    newTag: v-buildme
  - name: tasktreat-dev-wishlist-service
    newName: 066263929068.dkr.ecr.us-west-2.amazonaws.com/tasktreat-dev-wishlist-service
    newTag: v-buildme
  - name: tasktreat-dev-reward-service
    newName: 066263929068.dkr.ecr.us-west-2.amazonaws.com/tasktreat-dev-reward-service
    newTag: v-buildme
  - name: tasktreat-dev-frontend
    newName: 066263929068.dkr.ecr.us-west-2.amazonaws.com/tasktreat-dev-frontend
    newTag: v-buildme
