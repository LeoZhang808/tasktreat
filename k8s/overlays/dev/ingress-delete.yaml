# Dev no longer owns the public Ingress (prod does, see
# k8s/overlays/prod/ingress-patch.yaml.template). This $patch: delete
# removes the base Ingress from the dev render so we don't stand up a
# second ALB for an env nobody hits from a browser.
$patch: delete
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasktreat-ingress
