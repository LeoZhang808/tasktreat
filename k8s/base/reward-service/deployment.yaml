apiVersion: apps/v1
kind: Deployment
metadata:
  name: reward-service
  labels:
    app.kubernetes.io/name: reward-service
    app.kubernetes.io/part-of: tasktreat
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reward-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reward-service
        app.kubernetes.io/part-of: tasktreat
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: reward-service
          image: tasktreat-dev-reward-service:dev-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: tasktreat-config
                  key: NODE_ENV
            # reward-service fans out to task-service and wishlist-service
            # over the in-cluster ClusterIP DNS.
            - name: TASK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tasktreat-config
                  key: TASK_SERVICE_URL
            - name: WISHLIST_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tasktreat-config
                  key: WISHLIST_SERVICE_URL
            - name: REWARD_VALUE_PER_TASK
              valueFrom:
                configMapKeyRef:
                  name: tasktreat-config
                  key: REWARD_VALUE_PER_TASK
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tasktreat-db-secret
                  key: DATABASE_URL_REWARD
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
