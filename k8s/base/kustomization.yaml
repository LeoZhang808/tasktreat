apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common metadata applied to every resource in this base.
commonLabels:
  app.kubernetes.io/part-of: tasktreat

resources:
  # NOTE: namespaces are intentionally NOT rendered by this base. They are
  # cluster-scoped and the GitHub Actions deploy role only has namespace-
  # scoped admin (AmazonEKSAdminPolicy at type: namespace), so including
  # the Namespace here makes every `kubectl apply -k` try to PATCH the
  # namespace's labels and fail with Forbidden. namespace.yaml and the
  # per-overlay namespace-patch.yaml files are kept as references for
  # bootstrap (see k8s/README.md for the one-shot create commands).
  - configmap.yaml
  # secrets.example.yaml is intentionally NOT listed; the real Secret is
  # created out-of-band via `kubectl create secret generic tasktreat-db-secret`
  # so the password never ends up in Git.
  - task-service/deployment.yaml
  - task-service/service.yaml
  - wishlist-service/deployment.yaml
  - wishlist-service/service.yaml
  - reward-service/deployment.yaml
  - reward-service/service.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - ingress.yaml
