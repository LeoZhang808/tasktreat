# EXAMPLE ONLY -- DO NOT COMMIT THE REAL DATABASE PASSWORD.
#
# Each microservice owns its own Postgres schema (`task`, `wishlist`, `reward`)
# inside the shared `tasktreat` database. Prisma's `multiSchema` requires the
# correct `?schema=<name>` query parameter on the connection string, so we
# expose one secret key per service. Each Deployment maps its key to the
# generic `DATABASE_URL` env var the application code expects.
#
# Create the real secret out-of-band (do NOT `kubectl apply` this file):
#
#   PASSWORD='<the password from Terraform / your password manager>'
#   ENDPOINT='tasktreat-dev-postgres.c5emyy2yg5as.us-west-2.rds.amazonaws.com'
#
#   kubectl create secret generic tasktreat-db-secret \
#     --namespace tasktreat-dev \
#     --from-literal=DATABASE_URL_TASK="postgresql://tasktreat:${PASSWORD}@${ENDPOINT}:5432/tasktreat?schema=task" \
#     --from-literal=DATABASE_URL_WISHLIST="postgresql://tasktreat:${PASSWORD}@${ENDPOINT}:5432/tasktreat?schema=wishlist" \
#     --from-literal=DATABASE_URL_REWARD="postgresql://tasktreat:${PASSWORD}@${ENDPOINT}:5432/tasktreat?schema=reward"
#
# To rotate the secret:
#
#   kubectl delete secret tasktreat-db-secret -n tasktreat-dev
#   kubectl create secret generic tasktreat-db-secret ... (as above)
#   kubectl rollout restart deployment -n tasktreat-dev
apiVersion: v1
kind: Secret
metadata:
  name: tasktreat-db-secret
  namespace: tasktreat-dev
type: Opaque
stringData:
  DATABASE_URL_TASK: "postgresql://tasktreat:<PASSWORD>@tasktreat-dev-postgres.c5emyy2yg5as.us-west-2.rds.amazonaws.com:5432/tasktreat?schema=task"
  DATABASE_URL_WISHLIST: "postgresql://tasktreat:<PASSWORD>@tasktreat-dev-postgres.c5emyy2yg5as.us-west-2.rds.amazonaws.com:5432/tasktreat?schema=wishlist"
  DATABASE_URL_REWARD: "postgresql://tasktreat:<PASSWORD>@tasktreat-dev-postgres.c5emyy2yg5as.us-west-2.rds.amazonaws.com:5432/tasktreat?schema=reward"
