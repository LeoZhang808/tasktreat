apiVersion: apps/v1
kind: Deployment
metadata:
  name: wishlist-service
  labels:
    app.kubernetes.io/name: wishlist-service
    app.kubernetes.io/part-of: tasktreat
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wishlist-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wishlist-service
        app.kubernetes.io/part-of: tasktreat
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: wishlist-service
          image: tasktreat-dev-wishlist-service:dev-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: tasktreat-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tasktreat-db-secret
                  key: DATABASE_URL_WISHLIST
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
