server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Use Docker's embedded DNS so service names resolve at request time
  # (not just at nginx startup, which would fail before backends are healthy).
  resolver 127.0.0.11 ipv6=off valid=10s;

  # /api/<service>* -> http://<service>:<port>/api/<service>*
  # We pass the full original URI (including the /api/<x> prefix) because
  # each backend mounts its router at /api/<x>.
  #
  # NOTE: location prefixes intentionally have NO trailing slash. With a
  # trailing slash (e.g. `location /api/tasks/`), nginx auto-301s requests
  # for the same path without a slash (`/api/tasks` -> `/api/tasks/`) and
  # builds the redirect from $host, dropping the host port. Browsers then
  # follow the redirect to a port that isn't listening, surfacing as a
  # "Failed to fetch" in the SPA.

  location /api/tasks {
    set $upstream_task http://task-service:4001;
    proxy_pass $upstream_task$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/wishlist {
    set $upstream_wishlist http://wishlist-service:4002;
    proxy_pass $upstream_wishlist$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/rewards {
    set $upstream_reward http://reward-service:4003;
    proxy_pass $upstream_reward$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback (must come after the /api/* locations)
  location / {
    try_files $uri /index.html;
  }
}
