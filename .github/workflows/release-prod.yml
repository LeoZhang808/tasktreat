name: Release Production

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: read

concurrency:
  group: tasktreat-prod
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kubectl argo rollouts plugin
        # Lets us run `kubectl argo rollouts get rollout ... --watch` and
        # `... status ... --watch` to wait for canary completion. Without the
        # plugin we'd be limited to `kubectl get rollout` polling.
        run: |
          set -euo pipefail
          ARGO_VER=v1.7.2
          curl -fsSL -o kubectl-argo-rollouts \
            "https://github.com/argoproj/argo-rollouts/releases/download/${ARGO_VER}/kubectl-argo-rollouts-linux-amd64"
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/
          kubectl argo rollouts version

      - name: Install Kustomize
        run: |
          set -euo pipefail
          KVER=5.4.2
          curl -fsSL -o kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KVER}/kustomize_v${KVER}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz kustomize
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - id: meta
        name: Release tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying production with immutable tag ${TAG}"

      - name: Build & push all images
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          for spec in \
            "tasktreat-dev-task-service:services/task-service/Dockerfile" \
            "tasktreat-dev-wishlist-service:services/wishlist-service/Dockerfile" \
            "tasktreat-dev-reward-service:services/reward-service/Dockerfile" \
            "tasktreat-dev-frontend:frontend/Dockerfile"
          do
            repo="${spec%%:*}"
            file="${spec##*:}"
            image="${ECR_REGISTRY}/${repo}:${TAG}"
            docker build --platform linux/amd64 -f "$file" -t "$image" .
            docker push "$image"
          done

      - name: Kustomize set image (prod)
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          cd k8s/overlays/prod
          kustomize edit set image \
            tasktreat-dev-task-service="${ECR_REGISTRY}/tasktreat-dev-task-service:${TAG}" \
            tasktreat-dev-wishlist-service="${ECR_REGISTRY}/tasktreat-dev-wishlist-service:${TAG}" \
            tasktreat-dev-reward-service="${ECR_REGISTRY}/tasktreat-dev-reward-service:${TAG}" \
            tasktreat-dev-frontend="${ECR_REGISTRY}/tasktreat-dev-frontend:${TAG}"

      - name: kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: kubectl apply (prod)
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for canary rollouts to finish
        # Step 7: prod uses Argo Rollouts, not plain Deployments, so the old
        # `kubectl rollout status deployment/...` is not the right wait gate.
        # `kubectl argo rollouts status --watch` blocks until the rollout
        # reaches Healthy (all canary steps completed) or fails. Timeout is
        # generous because each rollout has two 60s pauses by design.
        run: |
          set -euo pipefail
          ns=tasktreat-prod
          for r in frontend task-service wishlist-service reward-service; do
            echo "==> waiting for rollout/$r"
            kubectl argo rollouts status "$r" -n "$ns" --timeout 600s
          done
          kubectl argo rollouts list rollouts -n "$ns"

      - name: Smoke tests (read-only)
        env:
          ENVIRONMENT: prod
          NAMESPACE: tasktreat-prod
          SMOKE_WRITE: "0"
        run: ./scripts/ci-smoke-test.sh
